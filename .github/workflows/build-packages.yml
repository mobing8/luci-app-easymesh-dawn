name: Build luci-app-easymesh Packages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.version }} - ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # 24.10.7 仅支持 mt7621 / x86_64，无 ipq60xx
          - version: "24.10.7"
            target: ramips/mt7621
            format: "ipk"
            sdk_suffix: "tar.zst"
            gcc_version: "13.3.0"
          # 25.12.5 三个架构全支持
          - version: "25.12.5"
            target: ramips/mt7621
            format: "apk"
            sdk_suffix: "tar.zst"
            gcc_version: "14.3.0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential file gawk gettext git \
            libelf-dev libncurses5-dev libssl-dev python3 \
            rsync unzip wget xsltproc zlib1g-dev zstd

      - name: Download OpenWrt SDK
        run: |
          TARGET_SLUG=$(echo ${{ matrix.target }} | tr '/' '-')
          SDK_FILENAME="openwrt-sdk-${{ matrix.version }}-${TARGET_SLUG}_gcc-${{ matrix.gcc_version }}_musl.Linux-x86_64.${{ matrix.sdk_suffix }}"
          SDK_URL="https://downloads.openwrt.org/releases/${{ matrix.version }}/targets/${{ matrix.target }}/${SDK_FILENAME}"
          echo "Download SDK: $SDK_URL"
          wget -q "$SDK_URL" -O sdk.${{ matrix.sdk_suffix }}
          tar -xf sdk.${{ matrix.sdk_suffix }}
          mv openwrt-sdk-* sdk
          echo "TARGET_SLUG=$TARGET_SLUG" >> $GITHUB_ENV

      - name: Add plugin to SDK
        run: |
          mkdir -p sdk/package/custom/luci-app-easymesh
          cp -r luasrc root po Makefile sdk/package/custom/luci-app-easymesh/

      - name: Pull LuCI feed and prepare build env
        run: |
          cd sdk
          ./scripts/feeds update luci
          ./scripts/feeds install luci-base

      - name: Generate minimal config
        run: |
          cd sdk
          make defconfig V=0

      - name: Compile package
        run: |
          cd sdk
          make package/luci-app-easymesh/compile V=s -j$(nproc) IGNORE_ERRORS=m

      - name: Collect packages
        run: |
          TARGET_SLUG=$(echo ${{ matrix.target }} | tr '/' '-')
          echo "TARGET_SLUG=$TARGET_SLUG" >> $GITHUB_ENV
          mkdir -p output/${{ matrix.format }}
          find sdk/bin/packages -name "luci-app-easymesh*.${{ matrix.format }}" -exec cp {} output/${{ matrix.format }}/ \;
          find sdk/bin/packages -name "luci-i18n-easymesh*.${{ matrix.format }}" -exec cp {} output/${{ matrix.format }}/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.version }}-${{ env.TARGET_SLUG }}
          path: output/${{ matrix.format }}/*
