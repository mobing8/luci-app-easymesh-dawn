name: Build luci-app-easymesh Packages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.version }} - ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "24.10.7"
            format: "ipk"
            sdk_suffix: "tar.xz"
          - version: "25.12.5"
            format: "apk"
            sdk_suffix: "tar.zst"
        target:
          - ramips/mt7621
          - x86/64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libelf-dev libncurses5-dev \
            libncursesw5-dev libssl-dev python3 python3-setuptools \
            rsync subversion swig time unzip wget xsltproc zlib1g-dev zstd

      - name: Download OpenWrt SDK
        run: |
          # 关键修复：target 路径斜杠替换为横杠，匹配官方 SDK 文件名
          TARGET_SLUG=$(echo ${{ matrix.target }} | tr '/' '-')
          SDK_URL="https://downloads.openwrt.org/releases/${{ matrix.version }}/targets/${{ matrix.target }}/openwrt-sdk-${{ matrix.version }}-${TARGET_SLUG}_*_musl.Linux-x86_64.${{ matrix.sdk_suffix }}"
          echo "Downloading: $SDK_URL"
          wget -q $SDK_URL -O sdk.${{ matrix.sdk_suffix }}
          tar -xf sdk.${{ matrix.sdk_suffix }}
          mv openwrt-sdk-* sdk

      - name: Copy plugin source to SDK
        run: |
          mkdir -p sdk/package/custom/luci-app-easymesh
          cp -r luasrc root po Makefile sdk/package/custom/luci-app-easymesh/

      - name: Update feeds and compile
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/luci-app-easymesh/compile V=s -j$(nproc)

      - name: Collect output packages
        run: |
          TARGET_SLUG=$(echo ${{ matrix.target }} | tr '/' '-')
          echo "TARGET_SLUG=$TARGET_SLUG" >> $GITHUB_ENV
          mkdir -p output/${{ matrix.format }}/${{ matrix.target }}
          find sdk/bin/packages -name "*.${{ matrix.format }}" -exec cp {} output/${{ matrix.format }}/${{ matrix.target }}/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-easymesh-${{ matrix.version }}-${{ env.TARGET_SLUG }}
          path: output/${{ matrix.format }}/${{ matrix.target }}/*
