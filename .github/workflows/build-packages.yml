name: Build luci-app-easymesh Packages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.version }} - ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "24.10.4"
            format: "ipk"
          - version: "25.12.0"
            format: "apk"
        target:
          - ramips/mt7621
          - x86/64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libelf-dev libncurses5-dev \
            libncursesw5-dev libssl-dev python3 python3-distutils python3-setuptools \
            rsync subversion swig time unzip wget xsltproc zlib1g-dev

      - name: Download OpenWrt SDK
        run: |
          TARGET_UNDERSCORE=$(echo ${{ matrix.target }} | tr '/' '_')
          SDK_URL="https://downloads.openwrt.org/releases/${{ matrix.version }}/targets/${{ matrix.target }}/openwrt-sdk-${{ matrix.version }}-${TARGET_UNDERSCORE}_*_musl.Linux-x86_64.tar.xz"
          wget -q $SDK_URL -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* sdk

      - name: Copy plugin source to SDK
        run: |
          mkdir -p sdk/package/custom/luci-app-easymesh
          cp -r luasrc root po Makefile sdk/package/custom/luci-app-easymesh/

      - name: Update feeds and compile
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/luci-app-easymesh/compile V=s -j$(nproc)

      - name: Collect output packages
        run: |
          mkdir -p output/${{ matrix.format }}/${{ matrix.target }}
          find sdk/bin/packages -name "*.${{ matrix.format }}" -exec cp {} output/${{ matrix.format }}/${{ matrix.target }}/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-easymesh-${{ matrix.version }}-${{ matrix.target//\//- }}
          path: output/${{ matrix.format }}/${{ matrix.target }}/*
